services:
  lumentrace:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true # Admin (sudo) privileges for GPIO, SPI, and /dev/mem hardware access
    volumes:
      - /dev:/dev
      - /run/dbus:/run/dbus:ro  # For PulseAudio/ALSA device detection
      - /dev/snd:/dev/snd:rw  # Explicit RW access to ALSA devices
    device_cgroup_rules:
      - 'c 116:* rmw'  # Audio device access (ALSA)
      - 'c 189:* rmw'  # USB device access (sound cards typically use major device 189)
    environment:
      # Updated from 3 to 0 because onboard audio is disabled to free PCM GPIO 21.
      # The USB sound card shifts to become the primary index (card 0).
      - ALSA_CARD=0  
      - PULSE_SERVER=unix:/run/pulse/native  # Optional: PulseAudio socket
    # "kernel does not support memory limit capabilities or the cgroup is 
    # not mounted. Limitation discarded. 0.0s
    # deploy:
    #   resources
    #     limits:
    #       cpus: '3.0'
    #       memory: 2G
    restart: unless-stopped # Automatically restart on crash and on system boot