# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  lumentrace:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true # Admin (sudo) privileges for GPIO and hardware access
    volumes:
      - /dev:/dev
      - /run/dbus:/run/dbus:ro  # For PulseAudio/ALSA device detection
      - /dev/snd:/dev/snd:rw  # Explicit RW access to ALSA devices
    device_cgroup_rules:
      - 'c 116:* rmw'  # Audio device access (ALSA)
      - 'c 189:* rmw'  # USB device access (sound cards typically use major device 189)
    environment:
      - ALSA_CARD=3  # Force use of USB Audio Device (card 3 from detection)
      - PULSE_SERVER=unix:/run/pulse/native  # Optional: PulseAudio socket
    # "Your kernel does not support memory limit capabilities or the cgroup is 
    # not mounted. Limitation discarded. 0.0s
    # deploy:
    #   resources
    #     limits:
    #       cpus: '3.0'
    #       memory: 2G
    restart: unless-stopped # Automatically restart on crash and on system boot
